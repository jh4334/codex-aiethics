<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="description" content="초등학생을 위한 AI 윤리 교육 게임. 몬스터의 마음을 안아 주며 개인정보·저작권·공정함·생성형 AI 등 AI 윤리를 배우는 모험.">
<meta property="og:type" content="website">
<meta property="og:title" content="AI 윤리 어드벤처">
<meta property="og:description" content="초등학생을 위한 AI 윤리 교육 게임 — 몬스터의 마음을 안아 주며 AI 윤리를 배워요.">
<meta property="og:image" content="icons/icon-512.png">
<meta name="twitter:card" content="summary">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI 윤리 어드벤처">

<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>AI 윤리 어드벤처</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000000;
    overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100%;
    max-height: 100%;
    outline: none;
  }
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* ---- 터치 컨트롤 (모바일/태블릿) ---- */
  #touch-ui { display: none; }
  body.touch #touch-ui { display: block; }
  .tbtn {
    position: fixed;
    --b: clamp(56px, 13vmin, 82px);
    width: var(--b); height: var(--b);
    background: rgba(28,30,46,.55);
    border: 2px solid rgba(255,255,255,.5);
    border-radius: 16px;
    padding: 0;
    color: #fff;
    font-family: inherit;
    font-size: clamp(22px, 5.4vmin, 30px);
    font-weight: bold;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
    appearance: none;
    -webkit-tap-highlight-color: transparent;
    z-index: 10;
    backdrop-filter: blur(2px);
    box-shadow: 0 2px 8px rgba(0,0,0,.45);
    transition: transform .04s ease, background .04s ease;
  }
  .tbtn:active { background: rgba(255,255,255,.42); color: #1c1e2e; transform: scale(.92); }
  .tbtn:focus-visible { outline: 3px solid #ffd644; outline-offset: 3px; }
  /* 버튼 아래 작은 안내 글자 */
  .tbtn .sub {
    position: absolute; bottom: -16px; left: 0; right: 0;
    text-align: center; font-size: 11px; font-weight: normal;
    color: rgba(255,255,255,.66); text-shadow: 0 1px 2px #000;
  }

  /* 가상 스틱 — 왼쪽 아래. 손가락으로 끌어 이동(상하좌우). */
  #t-stick {
    position: fixed;
    left: calc(20px + env(safe-area-inset-left));
    bottom: calc(24px + env(safe-area-inset-bottom));
    --sr: clamp(116px, 30vmin, 168px);
    width: var(--sr); height: var(--sr);
    border-radius: 50%;
    background: rgba(28,30,46,.42);
    border: 2px solid rgba(255,255,255,.38);
    box-shadow: inset 0 0 18px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.4);
    backdrop-filter: blur(2px);
    touch-action: none;
    z-index: 10;
  }
  /* 방향 힌트(십자 가이드) */
  #t-stick::before, #t-stick::after {
    content: ''; position: absolute; background: rgba(255,255,255,.16);
  }
  #t-stick::before { left: 18%; right: 18%; top: 50%; height: 2px; margin-top: -1px; }
  #t-stick::after  { top: 18%; bottom: 18%; left: 50%; width: 2px; margin-left: -1px; }
  #t-stick-knob {
    position: absolute; left: 50%; top: 50%;
    width: 46%; height: 46%;
    border-radius: 50%;
    background: rgba(255,255,255,.5);
    border: 2px solid rgba(255,255,255,.75);
    box-shadow: 0 2px 8px rgba(0,0,0,.45);
    transform: translate(-50%, -50%);
    transition: transform .03s linear;
    pointer-events: none;
  }

  /* A(결정/피하기) — 오른쪽 아래, 크고 둥글게 */
  #t-a {
    right: calc(26px + env(safe-area-inset-right));
    bottom: calc(44px + var(--b) * 0.4 + env(safe-area-inset-bottom));
    --b: clamp(72px, 17vmin, 104px);
    border-radius: 50%;
    background: rgba(224,90,90,.42);
    border-color: rgba(255,170,170,.7);
  }
  /* 도감(C) — 오른쪽 위 작은 버튼 */
  #t-menu {
    right: calc(16px + env(safe-area-inset-right));
    top: calc(16px + env(safe-area-inset-top));
    --b: clamp(46px, 9.5vmin, 58px);
    font-size: clamp(13px, 3vmin, 16px);
    border-radius: 12px;
  }
  /* 메뉴·뒤로(X) — 왼쪽 위 작은 버튼 */
  #t-pause {
    left: calc(16px + env(safe-area-inset-left));
    top: calc(16px + env(safe-area-inset-top));
    --b: clamp(46px, 9.5vmin, 58px);
    font-size: clamp(13px, 3vmin, 16px);
    border-radius: 12px;
  }
  /* 힌트(H) — 배틀 질문 화면에서만 표시, A 버튼 위쪽 */
  #t-hint { display: none; }
  body.battle-hint #t-hint {
    display: flex;
    right: calc(26px + env(safe-area-inset-right));
    bottom: calc(168px + var(--b) * 0.4 + env(safe-area-inset-bottom));
    --b: clamp(50px, 11.5vmin, 68px);
    font-size: clamp(12px, 2.6vmin, 15px);
    border-radius: 12px;
    background: rgba(255,214,68,.3);
    border-color: rgba(255,214,68,.7);
    color: #2a2410;
  }

  /* ---- 세로 모드일 때 가로로 돌리라는 안내 ---- */
  #rotate-hint {
    display: none;
    position: fixed; inset: 0;
    background: #000000;
    color: #fff;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; text-align: center;
    z-index: 100;
    font-size: 20px;
  }
  #rotate-hint .ico { font-size: 64px; animation: rot 1.8s ease-in-out infinite; }
  #rotate-hint small { color: #888; font-size: 15px; line-height: 1.5; }
  @keyframes rot { 0%,100% { transform: rotate(-12deg); } 50% { transform: rotate(78deg); } }
  @media (orientation: portrait) and (pointer: coarse) {
    #rotate-hint { display: flex; }
  }

  /* ---- 이름 입력 오버레이 ---- */
  #name-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.78);
    align-items: center; justify-content: center;
    z-index: 50;
  }
  #name-overlay .np-card {
    background: #000;
    border: 3px solid #fff;
    border-radius: 8px;
    padding: 28px 32px;
    text-align: center;
    width: min(86vw, 360px);
  }
  #name-overlay .np-title { color: #fff; font-size: 19px; font-weight: bold; margin-bottom: 6px; }
  #name-overlay .np-sub { color: #888; font-size: 13px; margin-bottom: 16px; }
  #name-input {
    width: 100%;
    font-size: 22px; text-align: center;
    padding: 10px 12px;
    border: 2px solid #444; border-radius: 6px;
    background: #000; color: #fff;
    outline: none;
  }
  #name-input:focus { border-color: #e0453a; }
  #name-overlay .np-hint { color: #777; font-size: 13px; margin-top: 14px; }
  #name-overlay .np-go {
    margin-top: 16px;
    background: #fff; color: #000;
    font-size: 16px; font-weight: bold;
    border: none; border-radius: 6px;
    padding: 12px 28px; cursor: pointer;
  }

  /* ---- 첫 로딩 실패 안내 (스크립트가 안 받아졌을 때) ---- */
  #boot-error {
    display: none;
    position: fixed; inset: 0;
    background: #000; color: #fff;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; text-align: center; padding: 24px;
    z-index: 200; font-size: 18px;
  }
  #boot-error small { color: #999; font-size: 14px; line-height: 1.6; }
  #boot-error button {
    background: #fff; color: #000;
    font-size: 16px; font-weight: bold;
    border: none; border-radius: 6px;
    padding: 12px 28px; cursor: pointer; margin-top: 6px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="720" height="528" tabindex="0" role="application" aria-label="AI 윤리 어드벤처 게임 화면. 방향키로 이동, Z 또는 스페이스로 결정합니다."></canvas>
</div>
<section id="a11y-panel" class="sr-only" aria-live="polite" aria-atomic="true">
  <h1>AI 윤리 어드벤처 상태</h1>
  <p id="a11y-status">게임을 불러오는 중입니다.</p>
  <p id="teacher-data-note">교사용 기록은 이 기기의 브라우저 저장소에 보관됩니다. 수업 전후에는 메뉴의 데이터 백업과 반 현황 CSV 내보내기를 사용하세요.</p>
</section>
<div id="touch-ui">
  <div id="t-stick" role="application" aria-label="이동 스틱. 손가락으로 끌어 상하좌우로 움직입니다.">
    <div id="t-stick-knob"></div>
  </div>
  <button type="button" class="tbtn" id="t-a" aria-label="결정·대화">A<span class="sub">결정</span></button>
  <button type="button" class="tbtn" id="t-hint" aria-label="50:50 힌트">힌트</button>
  <button type="button" class="tbtn" id="t-menu" aria-label="도감 열기">도감</button>
  <button type="button" class="tbtn" id="t-pause" aria-label="메뉴 열기">메뉴</button>
</div>
<div id="rotate-hint">
  <div class="ico">📱</div>
  <div>화면을 가로로 돌려 주세요</div>
  <small>AI 윤리 어드벤처는 가로 화면에 맞춰져 있어요</small>
</div>
<div id="name-overlay">
  <div class="np-card">
    <div class="np-title">수호자의 이름은?</div>
    <div class="np-sub">최대 6글자 · 비워 두면 "수호자"</div>
    <input id="name-input" maxlength="6" placeholder="수호자" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="수호자 이름 입력 (최대 6글자, 비우면 수호자)">
    <div><button class="np-go" id="name-go">모험 시작 ▶</button></div>
    <div class="np-hint">Enter 또는 A 버튼으로 시작 · Esc로 취소</div>
  </div>
</div>
<div id="boot-error">
  <div>게임을 불러오지 못했어요 😢</div>
  <small>인터넷 연결을 확인한 뒤 다시 시도해 주세요.<br>처음 한 번만 연결되면, 이후에는 오프라인에서도 실행됩니다.</small>
  <button onclick="location.reload()">다시 시도</button>
</div>
<script src="src/sprites.js"></script>
<script src="src/audio.js"></script>
<script src="src/data.js"></script>
<script src="src/game.js"></script>
<script>
  (function () {
    var statusEl = document.getElementById('a11y-status');
    var canvas = document.getElementById('game');
    if (!statusEl || !canvas) return;
    canvas.setAttribute('aria-describedby', 'a11y-status teacher-data-note');

    var lastText = '';
    function mapName(id) {
      try {
        if (typeof MAPS !== 'undefined' && MAPS[id] && MAPS[id].name) return MAPS[id].name;
      } catch (e) {
        return id || '알 수 없는 지역';
      }
      return id || '알 수 없는 지역';
    }
    function slotText(index) {
      var slot = index + 1;
      return '슬롯 ' + slot + ' 선택 중';
    }
    function describeGame() {
      var g = window.__game;
      if (!g) return '게임을 불러오는 중입니다.';
      if (g.mode === 'title') {
        if (g.titleScreen === 'name') return '이름 입력 화면입니다. 이름을 입력하고 모험 시작을 누르세요.';
        if (g.titleScreen === 'delete') return slotText(g.slotCursor) + '. 삭제 확인 중입니다. Z는 삭제, X는 취소입니다.';
        return '타이틀 화면입니다. ' + slotText(g.slotCursor) + '. 위아래로 슬롯을 고르고 Z로 시작합니다.';
      }
      if (g.mode === 'world') {
        return '탐험 화면입니다. 현재 지역은 ' + mapName(g.map) + '입니다. 방향키로 이동하고 Z로 대화합니다. X 또는 메뉴 버튼으로 모든 기능을 엽니다.';
      }
      if (g.mode === 'dialog') return '대화 화면입니다. Z 또는 스페이스로 다음 문장을 넘깁니다.';
      if (g.mode === 'puzzle') return '분류 퍼즐 화면입니다. 위아래로 문을 고르고 Z로 선택합니다. X로 돌아갑니다.';
      if (g.mode === 'battle') return '퀴즈 배틀 화면입니다. 위아래로 답을 고르고 Z로 결정합니다. 연속 정답과 오답 뒤 생각 질문을 확인할 수 있습니다.';
      if (g.mode === 'pause') return '메뉴 화면입니다. 수호자 일지, 교사용 대시보드, 학생 진단 리포트, 백업 기능을 선택할 수 있습니다.';
      if (g.mode === 'journal') return '수호자 일지입니다. 주제별 정답률, 윤리 조각, 윤리 이해도, 복습 노트를 확인합니다.';
      if (g.mode === 'challenge') return '퀴즈 챌린지 화면입니다. 연속 정답과 오답 회고를 확인하고, 결과 화면에서 다음 학습 추천을 봅니다.';
      if (g.mode === 'dashboard') return '교사용 대시보드입니다. 학생별 진행도와 윤리 축 히트맵을 봅니다. Z로 반 현황 CSV를 내보내고 X로 닫습니다.';
      if (g.mode === 'report') return '학생 진단 리포트입니다. 좌우로 학생 또는 반 전체를 바꾸고 Z로 텍스트 리포트를 내보냅니다. 반 전체에서는 윤리 축 평균도 확인합니다.';
      if (g.mode === 'backup') return '데이터 백업과 복원 화면입니다. 수업 기록은 이 기기에 저장되므로 백업을 권장합니다.';
      if (g.mode === 'classmode') {
        if (g.classmode && g.classmode.confirm) return '수업 모드 확인 화면입니다. 지금 학생 슬롯의 진행이 바뀝니다. 필요하면 먼저 데이터 백업을 하세요. Z는 시작, X는 취소입니다.';
        return '수업 모드입니다. 오늘 수업할 스테이지와 윤리 축을 고릅니다. 좌우로 스테이지를 바꾸고 Z로 확인합니다.';
      }
      if (g.mode === 'ending') return '엔딩 화면입니다. Z로 진행합니다.';
      return '현재 화면은 ' + g.mode + '입니다.';
    }
    function updateStatus() {
      var text = describeGame();
      var g = window.__game;
      if (g && g.storageOk === false) {
        text = '저장이 되지 않는 환경입니다. 메뉴의 데이터 백업을 이용하세요. ' + text;
      }
      if (text !== lastText) {
        statusEl.textContent = text;
        lastText = text;
      }
    }
    updateStatus();
    setInterval(updateStatus, 700);
  })();
</script>
<script>
  // 첫 로딩 감시: 게임이 일정 시간 안에 시작되지 않으면(스크립트 누락·네트워크 실패)
  // 검은 화면 대신 안내와 '다시 시도' 버튼을 보여 준다.
  (function () {
    var t = setTimeout(function () {
      if (!window.__game) {
        var el = document.getElementById('boot-error');
        if (el) el.style.display = 'flex';
      }
    }, 6000);
    window.addEventListener('error', function () {
      if (!window.__game) {
        var el = document.getElementById('boot-error');
        if (el) el.style.display = 'flex';
      }
    });
    // 정상 시작되면 감시 해제
    var iv = setInterval(function () {
      if (window.__game) { clearTimeout(t); clearInterval(iv); }
    }, 200);
  })();

  // 오프라인 설치(PWA) — file:// 로 직접 열었을 때는 등록하지 않는다
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
