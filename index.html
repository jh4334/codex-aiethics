<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI 윤리 어드벤처</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1c2c;
    overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    touch-action: none;
  }
  #wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100%;
    max-height: 100%;
  }
  /* 터치 컨트롤 */
  #touch-ui { display: none; }
  body.touch #touch-ui { display: block; }
  .tbtn {
    position: fixed;
    background: rgba(255,255,255,.15);
    border: 2px solid rgba(255,255,255,.4);
    border-radius: 12px;
    color: #fff;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    z-index: 10;
  }
  .tbtn:active { background: rgba(255,255,255,.35); }
  #t-up    { left: 78px;  bottom: 130px; width: 56px; height: 56px; }
  #t-down  { left: 78px;  bottom: 18px;  width: 56px; height: 56px; }
  #t-left  { left: 18px;  bottom: 74px;  width: 56px; height: 56px; }
  #t-right { left: 138px; bottom: 74px;  width: 56px; height: 56px; }
  #t-a     { right: 24px; bottom: 60px;  width: 72px; height: 72px; border-radius: 50%; font-size: 26px; background: rgba(255,120,120,.25); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="720" height="528"></canvas>
</div>
<div id="touch-ui">
  <div class="tbtn" id="t-up">▲</div>
  <div class="tbtn" id="t-down">▼</div>
  <div class="tbtn" id="t-left">◀</div>
  <div class="tbtn" id="t-right">▶</div>
  <div class="tbtn" id="t-a">A</div>
</div>
<script src="src/sprites.js"></script>
<script src="src/audio.js"></script>
<script src="src/data.js"></script>
<script src="src/game.js"></script>
</body>
</html>
