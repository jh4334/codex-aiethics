<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI 윤리 어드벤처">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>AI 윤리 어드벤처</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000000;
    overflow: hidden;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100%;
    max-height: 100%;
    outline: none;
  }

  /* ---- 터치 컨트롤 (모바일/태블릿) ---- */
  #touch-ui { display: none; }
  body.touch #touch-ui { display: block; }
  .tbtn {
    position: fixed;
    --b: clamp(56px, 13vmin, 82px);
    width: var(--b); height: var(--b);
    background: rgba(28,30,46,.55);
    border: 2px solid rgba(255,255,255,.5);
    border-radius: 16px;
    color: #fff;
    font-size: clamp(22px, 5.4vmin, 30px);
    font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
    z-index: 10;
    backdrop-filter: blur(2px);
    box-shadow: 0 2px 8px rgba(0,0,0,.45);
    transition: transform .04s ease, background .04s ease;
  }
  .tbtn:active { background: rgba(255,255,255,.42); color: #1c1e2e; transform: scale(.92); }
  /* 버튼 아래 작은 안내 글자 */
  .tbtn .sub {
    position: absolute; bottom: -16px; left: 0; right: 0;
    text-align: center; font-size: 11px; font-weight: normal;
    color: rgba(255,255,255,.66); text-shadow: 0 1px 2px #000;
  }

  /* 방향키 — 왼쪽 아래 십자 배치 (서로 살짝 떨어뜨려 오조작 줄임) */
  #t-up    { left: calc(18px + var(--b) + env(safe-area-inset-left)); bottom: calc(30px + var(--b) * 2); }
  #t-down  { left: calc(18px + var(--b) + env(safe-area-inset-left)); bottom: calc(22px + env(safe-area-inset-bottom)); }
  #t-left  { left: calc(12px + env(safe-area-inset-left));            bottom: calc(26px + var(--b)); }
  #t-right { left: calc(24px + var(--b) * 2 + env(safe-area-inset-left)); bottom: calc(26px + var(--b)); }

  /* A(결정/피하기) — 오른쪽 아래, 크고 둥글게 */
  #t-a {
    right: calc(26px + env(safe-area-inset-right));
    bottom: calc(44px + var(--b) * 0.4 + env(safe-area-inset-bottom));
    --b: clamp(72px, 17vmin, 104px);
    border-radius: 50%;
    background: rgba(224,90,90,.42);
    border-color: rgba(255,170,170,.7);
  }
  /* 도감(C) — 오른쪽 위 작은 버튼 */
  #t-menu {
    right: calc(16px + env(safe-area-inset-right));
    top: calc(16px + env(safe-area-inset-top));
    --b: clamp(46px, 9.5vmin, 58px);
    font-size: clamp(13px, 3vmin, 16px);
    border-radius: 12px;
  }
  /* 메뉴·뒤로(X) — 왼쪽 위 작은 버튼 */
  #t-pause {
    left: calc(16px + env(safe-area-inset-left));
    top: calc(16px + env(safe-area-inset-top));
    --b: clamp(46px, 9.5vmin, 58px);
    font-size: clamp(13px, 3vmin, 16px);
    border-radius: 12px;
  }
  /* 힌트(H) — 배틀 질문 화면에서만 표시, A 버튼 위쪽 */
  #t-hint { display: none; }
  body.battle-hint #t-hint {
    display: flex;
    right: calc(26px + env(safe-area-inset-right));
    bottom: calc(168px + var(--b) * 0.4 + env(safe-area-inset-bottom));
    --b: clamp(50px, 11.5vmin, 68px);
    font-size: clamp(12px, 2.6vmin, 15px);
    border-radius: 12px;
    background: rgba(255,214,68,.3);
    border-color: rgba(255,214,68,.7);
    color: #2a2410;
  }

  /* ---- 세로 모드일 때 가로로 돌리라는 안내 ---- */
  #rotate-hint {
    display: none;
    position: fixed; inset: 0;
    background: #000000;
    color: #fff;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; text-align: center;
    z-index: 100;
    font-size: 20px;
  }
  #rotate-hint .ico { font-size: 64px; animation: rot 1.8s ease-in-out infinite; }
  #rotate-hint small { color: #888; font-size: 15px; line-height: 1.5; }
  @keyframes rot { 0%,100% { transform: rotate(-12deg); } 50% { transform: rotate(78deg); } }
  @media (orientation: portrait) and (pointer: coarse) {
    #rotate-hint { display: flex; }
  }

  /* ---- 이름 입력 오버레이 ---- */
  #name-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.78);
    align-items: center; justify-content: center;
    z-index: 50;
  }
  #name-overlay .np-card {
    background: #000;
    border: 3px solid #fff;
    border-radius: 8px;
    padding: 28px 32px;
    text-align: center;
    width: min(86vw, 360px);
  }
  #name-overlay .np-title { color: #fff; font-size: 19px; font-weight: bold; margin-bottom: 6px; }
  #name-overlay .np-sub { color: #888; font-size: 13px; margin-bottom: 16px; }
  #name-input {
    width: 100%;
    font-size: 22px; text-align: center;
    padding: 10px 12px;
    border: 2px solid #444; border-radius: 6px;
    background: #000; color: #fff;
    outline: none;
  }
  #name-input:focus { border-color: #e0453a; }
  #name-overlay .np-hint { color: #777; font-size: 13px; margin-top: 14px; }
  #name-overlay .np-go {
    margin-top: 16px;
    background: #fff; color: #000;
    font-size: 16px; font-weight: bold;
    border: none; border-radius: 6px;
    padding: 12px 28px; cursor: pointer;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="720" height="528" tabindex="0"></canvas>
</div>
<div id="touch-ui">
  <div class="tbtn" id="t-up">▲</div>
  <div class="tbtn" id="t-down">▼</div>
  <div class="tbtn" id="t-left">◀</div>
  <div class="tbtn" id="t-right">▶</div>
  <div class="tbtn" id="t-a">A<span class="sub">결정</span></div>
  <div class="tbtn" id="t-hint">힌트</div>
  <div class="tbtn" id="t-menu">도감</div>
  <div class="tbtn" id="t-pause">메뉴</div>
</div>
<div id="rotate-hint">
  <div class="ico">📱</div>
  <div>화면을 가로로 돌려 주세요</div>
  <small>AI 윤리 어드벤처는 가로 화면에 맞춰져 있어요</small>
</div>
<div id="name-overlay">
  <div class="np-card">
    <div class="np-title">수호자의 이름은?</div>
    <div class="np-sub">최대 6글자 · 비워 두면 "수호자"</div>
    <input id="name-input" maxlength="6" placeholder="수호자" autocomplete="off" autocapitalize="off" spellcheck="false">
    <div><button class="np-go" id="name-go">모험 시작 ▶</button></div>
    <div class="np-hint">Enter 또는 A 버튼으로 시작 · Esc로 취소</div>
  </div>
</div>
<script src="src/sprites.js"></script>
<script src="src/audio.js"></script>
<script src="src/data.js"></script>
<script src="src/game.js"></script>
<script>
  // 오프라인 설치(PWA) — file:// 로 직접 열었을 때는 등록하지 않는다
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
