<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커스텀 퀴즈 편집기 — AI 윤리 어드벤처</title>
<style>
  :root { --bg:#15171f; --card:#1e2230; --line:#333a4d; --fg:#eef1f7; --mut:#9aa3b8;
          --acc:#e0453a; --ok:#5cb85c; --bad:#e0573a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; line-height:1.5; }
  header { padding:18px 20px; border-bottom:1px solid var(--line); position:sticky; top:0;
           background:var(--bg); z-index:5; }
  header h1 { margin:0; font-size:20px; }
  header p { margin:4px 0 0; color:var(--mut); font-size:13px; }
  main { max-width:860px; margin:0 auto; padding:18px 16px 120px; }
  .q { background:var(--card); border:1px solid var(--line); border-radius:10px;
       padding:14px 16px; margin:14px 0; }
  .q .row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .q .num { font-weight:bold; color:var(--mut); min-width:28px; }
  label { font-size:12px; color:var(--mut); display:block; margin:8px 0 3px; }
  textarea, input[type=text] { width:100%; background:#11131a; color:var(--fg);
      border:1px solid var(--line); border-radius:6px; padding:8px 10px; font-size:14px;
      font-family:inherit; resize:vertical; }
  textarea:focus, input:focus { outline:none; border-color:var(--acc); }
  .opt { display:flex; align-items:center; gap:8px; margin:4px 0; }
  .opt input[type=radio] { width:18px; height:18px; accent-color:var(--ok); flex:none; }
  .opt input[type=text] { flex:1; }
  .opt .tag { font-size:11px; color:var(--mut); min-width:46px; }
  .count { font-size:11px; color:var(--mut); text-align:right; }
  .count.over { color:var(--bad); }
  button { font-family:inherit; cursor:pointer; border:none; border-radius:6px;
           padding:9px 14px; font-size:14px; font-weight:bold; }
  .btn-del { background:#3a2030; color:#ffb4b4; padding:6px 10px; font-size:12px; }
  .btn-add { background:#21314a; color:#cfe3ff; }
  .toolbar { display:flex; flex-wrap:wrap; gap:10px; margin:16px 0; }
  .toolbar .grow { flex:1; }
  .btn-primary { background:var(--ok); color:#08220c; }
  .btn-second { background:#2a2f40; color:var(--fg); }
  .err { color:var(--bad); font-size:12px; margin-top:4px; min-height:14px; }
  .bar { position:fixed; left:0; right:0; bottom:0; background:var(--card);
         border-top:1px solid var(--line); padding:12px 16px; display:flex;
         gap:10px; flex-wrap:wrap; align-items:center; justify-content:center; }
  .bar .status { color:var(--mut); font-size:13px; margin-right:auto; }
  details { margin-top:16px; }
  summary { cursor:pointer; color:var(--mut); font-size:13px; }
  pre { background:#0d0f15; border:1px solid var(--line); border-radius:8px; padding:12px;
        overflow:auto; font-size:12px; color:#bcd; max-height:300px; }
  .toast { position:fixed; left:50%; bottom:78px; transform:translateX(-50%);
           background:var(--ok); color:#08220c; font-weight:bold; padding:10px 18px;
           border-radius:8px; opacity:0; transition:opacity .2s; pointer-events:none; }
  .toast.show { opacity:1; }
  .toast.bad { background:var(--bad); color:#fff; }
</style>
</head>
<body>
<header>
  <h1>✎ 커스텀 퀴즈 편집기</h1>
  <p>선생님이 우리 반 문제를 만들어 게임에 넣을 수 있어요. 파일을 두 번 눌러 열면 바로 쓸 수 있습니다(인터넷 불필요).
     완성한 JSON을 게임의 <b>메뉴 → 커스텀 퀴즈 → 가져오기</b>로 넣으세요.</p>
</header>
<main>
  <div id="list"></div>
  <div class="toolbar">
    <button class="btn-add" id="add">＋ 문제 추가</button>
    <span class="grow"></span>
  </div>

  <details>
    <summary>JSON 미리보기 / 직접 불러오기</summary>
    <label>아래에 기존 JSON을 붙여넣고 "불러오기"를 누르면 편집할 수 있어요.</label>
    <textarea id="raw" rows="6" placeholder='{ "questions": [ ... ] }'></textarea>
    <div class="toolbar">
      <button class="btn-second" id="load">불러오기</button>
      <button class="btn-second" id="refresh">미리보기 갱신</button>
    </div>
    <pre id="preview"></pre>
  </details>
</main>

<div class="bar">
  <span class="status" id="status">문제 0개</span>
  <button class="btn-second" id="copy">JSON 복사</button>
  <button class="btn-primary" id="save">JSON 파일로 저장</button>
</div>
<div class="toast" id="toast"></div>

<script>
// 게임(src/game.js)과 동일한 한도 — 넘으면 게임에서 잘리므로 여기서 미리 경고한다.
var LIMITS = { q: 140, a: 40, why: 200, max: 50 };
var questions = [];

function uid() { return Math.random().toString(36).slice(2, 9); }
function emptyQ() { return { id: uid(), q: '', a: ['', '', ''], c: 0, why: '' }; }

function el(tag, attrs, kids) {
  var n = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k === 'class') n.className = attrs[k];
    else if (k.slice(0, 2) === 'on') n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  (kids || []).forEach(function (c) { n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return n;
}

function counter(getLen, max) {
  var c = el('div', { class: 'count' });
  c.update = function () {
    var n = getLen();
    c.textContent = n + ' / ' + max;
    c.className = 'count' + (n > max ? ' over' : '');
  };
  c.update();
  return c;
}

function render() {
  var list = document.getElementById('list');
  list.innerHTML = '';
  questions.forEach(function (q, i) {
    var card = el('div', { class: 'q' });

    var head = el('div', { class: 'row' }, [el('span', { class: 'num' }, ['' + (i + 1)])]);
    head.appendChild(el('span', { class: 'grow', style: 'flex:1' }));
    head.appendChild(el('button', { class: 'btn-del', onclick: function () {
      questions.splice(i, 1); render();
    } }, ['삭제']));
    card.appendChild(head);

    card.appendChild(el('label', {}, ['문제 (줄바꿈 가능)']));
    var qta = el('textarea', { rows: '2' });
    qta.value = q.q;
    var qc = counter(function () { return qta.value.length; }, LIMITS.q);
    qta.addEventListener('input', function () { q.q = qta.value; qc.update(); updateStatus(); });
    card.appendChild(qta); card.appendChild(qc);

    card.appendChild(el('label', {}, ['보기 3개 — 왼쪽 동그라미로 정답을 고르세요']));
    q.a.forEach(function (opt, j) {
      var rb = el('input', { type: 'radio', name: 'c_' + q.id });
      if (q.c === j) rb.checked = true;
      rb.addEventListener('change', function () { q.c = j; });
      var ti = el('input', { type: 'text' });
      ti.value = opt;
      var oc = counter(function () { return ti.value.length; }, LIMITS.a);
      ti.addEventListener('input', function () { q.a[j] = ti.value; oc.update(); });
      var rowWrap = el('div', {}, [
        el('div', { class: 'opt' }, [rb, el('span', { class: 'tag' }, ['보기 ' + (j + 1)]), ti]),
        oc,
      ]);
      card.appendChild(rowWrap);
    });

    card.appendChild(el('label', {}, ['해설 (정답을 맞히면 보여 줄 설명)']));
    var wta = el('textarea', { rows: '2' });
    wta.value = q.why;
    var wc = counter(function () { return wta.value.length; }, LIMITS.why);
    wta.addEventListener('input', function () { q.why = wta.value; wc.update(); });
    card.appendChild(wta); card.appendChild(wc);

    var err = el('div', { class: 'err' }, [problem(q) || '']);
    card.appendChild(err);

    list.appendChild(card);
  });
  updateStatus();
  refreshPreview();
}

// 한 문항의 문제점을 한 줄로(없으면 '')
function problem(q) {
  if (!q.q.trim()) return '⚠ 문제 내용을 입력하세요.';
  if (q.a.some(function (x) { return !x.trim(); })) return '⚠ 보기 3개를 모두 입력하세요.';
  if (!q.why.trim()) return '⚠ 해설을 입력하세요.';
  if (q.q.length > LIMITS.q) return '⚠ 문제가 너무 길어요(' + LIMITS.q + '자 이내).';
  if (q.a.some(function (x) { return x.length > LIMITS.a; })) return '⚠ 보기가 너무 길어요(' + LIMITS.a + '자 이내).';
  if (q.why.length > LIMITS.why) return '⚠ 해설이 너무 길어요(' + LIMITS.why + '자 이내).';
  return '';
}

function validQuestions() {
  return questions.filter(function (q) { return !problem(q); });
}

function buildJson() {
  var out = validQuestions().slice(0, LIMITS.max).map(function (q) {
    return { q: q.q.trim(), a: q.a.map(function (x) { return x.trim(); }), c: q.c, why: q.why.trim() };
  });
  return JSON.stringify({ questions: out }, null, 2);
}

function updateStatus() {
  var ok = validQuestions().length;
  var st = document.getElementById('status');
  st.textContent = '완성된 문제 ' + ok + '개 / 전체 ' + questions.length + '개'
    + (questions.length > LIMITS.max ? ' (최대 ' + LIMITS.max + '개까지 저장)' : '');
}

function refreshPreview() {
  document.getElementById('preview').textContent = buildJson();
}

function toast(msg, bad) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (bad ? ' bad' : '');
  setTimeout(function () { t.className = 'toast'; }, 1600);
}

document.getElementById('add').addEventListener('click', function () {
  if (questions.length >= LIMITS.max) { toast('최대 ' + LIMITS.max + '문항까지 만들 수 있어요', true); return; }
  questions.push(emptyQ()); render();
  window.scrollTo(0, document.body.scrollHeight);
});

document.getElementById('copy').addEventListener('click', function () {
  if (validQuestions().length === 0) { toast('완성된 문제가 없어요', true); return; }
  var text = buildJson();
  function done() { toast('JSON을 복사했어요 — 게임에서 "가져오기 → 클립보드"'); }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, fallbackCopy);
  } else fallbackCopy();
  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch (e) { toast('복사 실패 — 미리보기에서 직접 복사하세요', true); }
    document.body.removeChild(ta);
  }
});

document.getElementById('save').addEventListener('click', function () {
  if (validQuestions().length === 0) { toast('완성된 문제가 없어요', true); return; }
  var blob = new Blob([buildJson()], { type: 'application/json;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'custom-quiz.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  toast('custom-quiz.json 으로 저장했어요');
});

document.getElementById('load').addEventListener('click', function () {
  var raw = document.getElementById('raw').value;
  var obj;
  try { obj = JSON.parse(raw); } catch (e) { toast('JSON 형식이 올바르지 않아요', true); return; }
  var arr = Array.isArray(obj) ? obj : (obj && Array.isArray(obj.questions) ? obj.questions : null);
  if (!arr) { toast('questions 배열을 찾을 수 없어요', true); return; }
  questions = arr.map(function (q) {
    return {
      id: uid(),
      q: typeof q.q === 'string' ? q.q : '',
      a: (Array.isArray(q.a) ? q.a.slice(0, 3) : []).concat(['', '', '']).slice(0, 3)
         .map(function (x) { return typeof x === 'string' ? x : ''; }),
      c: Number.isInteger(q.c) && q.c >= 0 && q.c < 3 ? q.c : 0,
      why: typeof q.why === 'string' ? q.why : '',
    };
  });
  render();
  toast('문제 ' + questions.length + '개를 불러왔어요');
});

document.getElementById('refresh').addEventListener('click', refreshPreview);

// 시작: 빈 문제 1개
questions.push(emptyQ());
render();
</script>
</body>
</html>
