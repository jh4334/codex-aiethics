name: 오프라인 배포본 릴리스

# v* 태그를 올리면(예: git tag v1.1.0 && git push --tags) 검증을 통과한 뒤
# 설치 없이 압축만 풀어 index.html을 열면 되는 오프라인 ZIP을 릴리스에 첨부한다.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 깨진 빌드가 릴리스로 나가지 않도록 먼저 검증한다
      - name: 데이터 검증
        run: node tools/validate.js
      - name: 스모크 테스트
        run: node tools/smoketest.js
      - name: 슬롯 테스트
        run: node tools/slottest.js
      - name: 브라우저 테스트 준비
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: 브라우저 스모크 테스트
        run: npm run test:browser
      - name: 오프라인 ZIP 빌드
        run: npm run pack
      - name: 릴리스에 첨부
        uses: softprops/action-gh-release@v2
        with:
          files: ai-ethics-adventure-offline.zip
          body: |
            ## 오프라인 배포본
            압축을 풀고 `index.html`을 열면 인터넷 없이 바로 실행됩니다.
            교사용 안내서·활동지는 `docs/` 폴더에 들어 있습니다.
